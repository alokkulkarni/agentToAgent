<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2A Interactive Workflow - WebSocket Client</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 30px;
        }
        
        .section {
            background: #f7f9fc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e1e8ed;
        }
        
        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        
        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }
        
        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.waiting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        #messages {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        
        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
        }
        
        .message.info {
            background: rgba(33, 150, 243, 0.1);
            border-left: 3px solid #2196F3;
        }
        
        .message.success {
            background: rgba(76, 175, 80, 0.1);
            border-left: 3px solid #4CAF50;
        }
        
        .message.warning {
            background: rgba(255, 152, 0, 0.1);
            border-left: 3px solid #FF9800;
        }
        
        .message.error {
            background: rgba(244, 67, 54, 0.1);
            border-left: 3px solid #F44336;
        }
        
        .interaction-request {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            border: 2px solid #667eea;
        }
        
        .interaction-request h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .interaction-request .question {
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        
        .interaction-request .reasoning {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .option-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            text-align: left;
            padding: 12px 16px;
            transition: all 0.2s;
        }
        
        .option-btn:hover {
            background: #667eea;
            color: white;
        }
        
        .workflow-info {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .info-card {
            background: white;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e1e8ed;
        }
        
        .info-card .label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .info-card .value {
            font-size: 20px;
            font-weight: 600;
            color: #667eea;
        }
        
        .timestamp {
            color: #888;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 A2A Interactive Workflow</h1>
            <p>Real-time Human-AI Collaboration via WebSocket</p>
        </div>
        
        <div class="main">
            <!-- Left Column: Connection & Workflow Submission -->
            <div>
                <div class="section">
                    <h2>🔌 Connection</h2>
                    <div id="connectionStatus" class="status disconnected">
                        ⚫ Disconnected
                    </div>
                    <div class="input-group">
                        <label for="workflowId">Workflow ID:</label>
                        <input type="text" id="workflowId" placeholder="Enter workflow ID or leave empty for new">
                    </div>
                    <button id="connectBtn" onclick="connect()">Connect</button>
                    <button id="disconnectBtn" onclick="disconnect()" disabled>Disconnect</button>
                </div>
                
                <div class="section">
                    <h2>📝 Submit Workflow</h2>
                    <div class="input-group">
                        <label for="taskDescription">Task Description:</label>
                        <textarea id="taskDescription" placeholder="E.g., Analyze this code and suggest improvements...">Add 25 and 17, then square the result</textarea>
                    </div>
                    <button onclick="submitWorkflow()">Execute Workflow</button>
                </div>
                
                <div class="section">
                    <h2>📊 Workflow Status</h2>
                    <div class="workflow-info">
                        <div class="info-card">
                            <div class="label">Status</div>
                            <div class="value" id="workflowStatus">-</div>
                        </div>
                        <div class="info-card">
                            <div class="label">Progress</div>
                            <div class="value" id="workflowProgress">0/0</div>
                        </div>
                    </div>
                    <button onclick="requestStatus()">Refresh Status</button>
                </div>
            </div>
            
            <!-- Right Column: Messages & Interactions -->
            <div>
                <div class="section" style="height: 100%;">
                    <h2>💬 Messages</h2>
                    <div id="messages"></div>
                    <button onclick="clearMessages()" style="margin-top: 10px;">Clear Messages</button>
                </div>
            </div>
        </div>
        
        <!-- Interaction Request Area (appears when needed) -->
        <div id="interactionArea" style="display: none; padding: 0 30px 30px 30px;">
            <div class="interaction-request">
                <h3>❓ User Input Required</h3>
                <div class="question" id="interactionQuestion"></div>
                <div class="reasoning" id="interactionReasoning"></div>
                <div id="interactionOptions" class="options"></div>
            </div>
        </div>
    </div>

    <script>
        let ws = null;
        let currentWorkflowId = null;
        let currentRequestId = null;

        function addMessage(text, type = 'info') {
            const messages = document.getElementById('messages');
            const message = document.createElement('div');
            message.className = `message ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            message.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${text}`;
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
        }

        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
        }

        function updateConnectionStatus(connected) {
            const status = document.getElementById('connectionStatus');
            const connectBtn = document.getElementById('connectBtn');
            const disconnectBtn = document.getElementById('disconnectBtn');
            
            if (connected) {
                status.className = 'status connected';
                status.textContent = '🟢 Connected';
                connectBtn.disabled = true;
                disconnectBtn.disabled = false;
            } else {
                status.className = 'status disconnected';
                status.textContent = '⚫ Disconnected';
                connectBtn.disabled = false;
                disconnectBtn.disabled = true;
            }
        }

        function updateWorkflowStatus(status, completed, total) {
            document.getElementById('workflowStatus').textContent = status || '-';
            document.getElementById('workflowProgress').textContent = `${completed || 0}/${total || 0}`;
        }

        function showInteractionRequest(interaction) {
            const area = document.getElementById('interactionArea');
            const question = document.getElementById('interactionQuestion');
            const reasoning = document.getElementById('interactionReasoning');
            const options = document.getElementById('interactionOptions');
            
            currentRequestId = interaction.request_id;
            
            question.textContent = interaction.question;
            reasoning.textContent = interaction.reasoning || '';
            
            options.innerHTML = '';
            
            if (interaction.input_type === 'single_choice' && interaction.options) {
                interaction.options.forEach(option => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = option;
                    btn.onclick = () => submitResponse(option);
                    options.appendChild(btn);
                });
            } else if (interaction.input_type === 'text') {
                const textarea = document.createElement('textarea');
                textarea.placeholder = interaction.placeholder || 'Enter your response...';
                textarea.style.width = '100%';
                textarea.style.marginBottom = '10px';
                textarea.id = 'responseText';
                options.appendChild(textarea);
                
                const btn = document.createElement('button');
                btn.textContent = 'Submit Response';
                btn.onclick = () => {
                    const response = document.getElementById('responseText').value;
                    if (response) submitResponse(response);
                };
                options.appendChild(btn);
            }
            
            area.style.display = 'block';
            addMessage('❓ User input required - please respond below', 'warning');
        }

        function hideInteractionRequest() {
            document.getElementById('interactionArea').style.display = 'none';
            currentRequestId = null;
        }

        function submitResponse(response) {
            if (!ws || !currentRequestId) return;
            
            const message = {
                type: 'user_response',
                request_id: currentRequestId,
                response: response
            };
            
            ws.send(JSON.stringify(message));
            addMessage(`✓ Submitted response: ${response}`, 'success');
            hideInteractionRequest();
        }

        function connect() {
            const workflowId = document.getElementById('workflowId').value || `workflow_${Date.now()}`;
            currentWorkflowId = workflowId;
            
            const wsUrl = `ws://localhost:8100/ws/workflow/${workflowId}`;
            addMessage(`Connecting to ${wsUrl}...`, 'info');
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                addMessage('✓ WebSocket connected!', 'success');
                updateConnectionStatus(true);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
            
            ws.onerror = (error) => {
                addMessage(`❌ WebSocket error: ${error}`, 'error');
            };
            
            ws.onclose = () => {
                addMessage('WebSocket disconnected', 'warning');
                updateConnectionStatus(false);
                ws = null;
            };
        }

        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        function handleMessage(data) {
            const type = data.type;
            
            switch(type) {
                case 'connection_established':
                    addMessage(`✓ Connected to workflow: ${data.workflow_id}`, 'success');
                    document.getElementById('workflowId').value = data.workflow_id;
                    currentWorkflowId = data.workflow_id;
                    break;
                
                case 'workflow_status':
                    updateWorkflowStatus(data.status, data.steps_completed, data.total_steps);
                    addMessage(`Status: ${data.status} (${data.steps_completed}/${data.total_steps})`, 'info');
                    
                    if (data.pending_interaction) {
                        showInteractionRequest(data.pending_interaction);
                    }
                    break;
                
                case 'step_started':
                    const startDesc = data.step.description || data.step.capability;
                    updateWorkflowStatus('running', data.step.step_number - 1, data.step.total_steps);
                    addMessage(`▶️ Step ${data.step.step_number}/${data.step.total_steps}: ${startDesc}`, 'info');
                    break;
                
                case 'step_completed':
                    const completeDesc = data.step.description || data.step.capability;
                    updateWorkflowStatus('running', data.step.step_number, data.step.total_steps);
                    addMessage(`✅ Step ${data.step.step_number} completed: ${completeDesc}`, 'success');
                    
                    // Show result preview if available
                    if (data.result) {
                        const resultStr = JSON.stringify(data.result);
                        const preview = resultStr.length > 100 ? resultStr.substring(0, 100) + '...' : resultStr;
                        addMessage(`   Result: ${preview}`, 'info');
                    }
                    break;
                
                case 'step_failed':
                    const failDesc = data.step.description || data.step.capability;
                    addMessage(`❌ Step ${data.step.step_number} failed: ${failDesc}`, 'error');
                    addMessage(`   Error: ${data.error}`, 'error');
                    break;
                
                case 'step_error':
                    const errorDesc = data.step.description || data.step.capability;
                    addMessage(`❌ Step ${data.step.step_number} error: ${errorDesc}`, 'error');
                    addMessage(`   Error: ${data.error}`, 'error');
                    break;
                
                case 'user_input_required':
                    showInteractionRequest(data.interaction);
                    break;
                
                case 'response_received':
                    addMessage(`✓ Response received, workflow resuming...`, 'success');
                    break;
                
                case 'workflow_resuming':
                    addMessage(`🔄 Workflow resuming...`, 'info');
                    updateWorkflowStatus('running', null, null);
                    break;
                
                case 'workflow_completed':
                    addMessage(`🎉 Workflow completed!`, 'success');
                    const stepsCompleted = data.steps_completed || data.result?.steps_completed || 0;
                    const totalSteps = data.total_steps || data.result?.total_steps || 0;
                    updateWorkflowStatus('completed', stepsCompleted, totalSteps);
                    
                    // Show summary
                    if (data.result?.reflection?.summary) {
                        addMessage(`   Summary: ${data.result.reflection.summary}`, 'info');
                    }
                    break;
                
                case 'error':
                    addMessage(`❌ Error: ${data.message || data.error}`, 'error');
                    break;
                
                case 'pong':
                    // Silent
                    break;
                
                default:
                    addMessage(`📨 ${type}: ${JSON.stringify(data)}`, 'info');
            }
        }

        async function submitWorkflow() {
            const task = document.getElementById('taskDescription').value;
            if (!task) {
                alert('Please enter a task description');
                return;
            }
            
            addMessage(`Submitting workflow: ${task}`, 'info');
            
            try {
                const response = await fetch('http://localhost:8100/api/workflow/execute', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        task_description: task,
                        workflow_id: currentWorkflowId
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    addMessage(`✓ Workflow submitted: ${result.workflow_id}`, 'success');
                    
                    if (!ws) {
                        document.getElementById('workflowId').value = result.workflow_id;
                        connect();
                    }
                } else {
                    addMessage(`❌ Error: ${result.detail || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                addMessage(`❌ Error submitting workflow: ${error}`, 'error');
            }
        }

        function requestStatus() {
            if (!ws) {
                alert('Not connected. Please connect first.');
                return;
            }
            
            ws.send(JSON.stringify({type: 'get_status'}));
        }

        // Keep connection alive
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'ping'}));
            }
        }, 30000);
    </script>
</body>
</html>
